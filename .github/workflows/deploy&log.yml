name: Deploy PBIP to Power BI and Update Changelog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Install fabric-cicd
        run: pip install fabric-cicd

      - name: Get changed workspaces
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 | tr '\n' ',')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Deploy Git Integration Test
        if: contains(steps.changes.outputs.files, 'Git Integration Test/')
        run: python deploy.py --workspace_name "Git Integration Test"

  changelog:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect and log PBIP changes
        id: detect
        run: |
          SINCE=${{ github.event.before }}
          NOW=${{ github.event.after }}

          if [ "$SINCE" = "0000000000000000000000000000000000000000" ]; then
            SINCE=$(git rev-list --max-parents=0 HEAD)
          fi

          CHANGES=$(git diff --name-status $SINCE $NOW \
          | awk -F'\t' '
            function extract(path,   arr) {
              if (match(path, /^PowerBI\/([^\/]+)\/([^\/]+)\/[^\/]+\.pbip$/, arr)) {
                return arr[1] "/" arr[2]
              }
              if (match(path, /^PowerBI\/([^\/]+)\/([^\/]+)\//, arr)) {
                return arr[1] "/" arr[2]
              }
              return ""
            }
            {
              status = $1

              if (status ~ /^[AMD]/) {
                folder = extract($2)
                if (folder != "") {
                  if (status == "A") current_status = "CREATED"
                  else if (status == "D") current_status = "DELETED"
                  else current_status = "MODIFIED"
                  changes[folder] = current_status "|" folder
                }
              }
            }
            END {
              for (folder in changes) print changes[folder]
            }
          ')

          if [ -z "$CHANGES" ]; then
            echo "No PBIP changes in this push, skipping."
            exit 0
          fi

          LOG_FILE="changelog.md"
          touch $LOG_FILE

          python3 - <<EOF
          import re
          from datetime import datetime, timezone

          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          raw_changes = """$CHANGES"""

          # Parse incoming changes into dict: report -> status
          incoming = {}
          for line in raw_changes.strip().split("\n"):
              parts = line.split("|")
              if len(parts) == 2:
                  status, report = parts
                  incoming[report.strip()] = status.strip()

          with open("changelog.md", "r") as f:
              content = f.read()

          sections = re.split(r'(?=^## \d{4}-\d{2}-\d{2})', content, flags=re.MULTILINE)
          sections = [s for s in sections if s.strip()]

          if sections and sections[0].startswith(f"## {date}"):
              # Parse existing today's entries
              existing = {}
              for line in sections[0].split("\n"):
                  line = line.strip()
                  if ":" in line and not line.startswith("#") and not line.startswith("-"):
                      status, name = line.split(":", 1)
                      status = status.strip()
                      name = name.strip()
                      if status in ("CREATED", "MODIFIED", "DELETED"):
                          existing[name] = status

              # Merge using priority matrix
              for report, new_status in incoming.items():
                  if report not in existing:
                      existing[report] = new_status
                  else:
                      ex_status = existing[report]
                      if ex_status == "CREATED":
                          if new_status == "DELETED":
                              existing[report] = "DELETED"
                          # CREATED + MODIFIED stays CREATED
                      elif ex_status == "MODIFIED":
                          if new_status == "DELETED":
                              existing[report] = "DELETED"
                          # MODIFIED + MODIFIED stays MODIFIED
                      elif ex_status == "DELETED":
                          if new_status == "CREATED":
                              existing[report] = "CREATED"
                          # DELETED + DELETED stays DELETED

              lines = [f"{status}: {report}" for report, status in existing.items()]
              sections[0] = f"## {date}\n\n" + "\n".join(lines) + "\n\n---\n"

          else:
              lines = [f"{status}: {report}" for report, status in incoming.items()]
              new_entry = f"## {date}\n\n" + "\n".join(lines) + "\n\n---\n"
              sections.insert(0, new_entry)

          trimmed = sections[:30]

          with open("changelog.md", "w") as f:
              f.write("\n".join(trimmed).strip() + "\n")
          EOF

          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit changelog
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changelog.md
          git diff --staged --quiet || git commit -m "chore: update changelog $(date -u +%Y-%m-%d)"
          git push
