name: PBIP Change Log

on:
  push:
    branches:
      - main

jobs:
  log-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect and log PBIP changes
        id: detect
        run: |
          SINCE=${{ github.event.before }}
          NOW=${{ github.event.after }}

          if [ "$SINCE" = "0000000000000000000000000000000000000000" ]; then
            SINCE=$(git rev-list --max-parents=0 HEAD)
          fi

          CHANGES=$(git diff --name-status -M $SINCE $NOW \
          | awk -F'\t' '
            function extract(path,   arr) {
              if (match(path, /^PowerBI\/([^\/]+)\/([^\/]+)\/[^\/]+\.pbip$/, arr)) {
                return arr[1] "/" arr[2]
              }
              if (match(path, /^PowerBI\/([^\/]+)\/([^\/]+)\//, arr)) {
                return arr[1] "/" arr[2]
              }
              return ""
            }
            {
              status = $1

              if (status ~ /^R/) {
                old_key = extract($2)
                new_key = extract($3)
                if (old_key != "" && new_key != "") {
                  match(status, /^R([0-9]+)/, score_arr)
                  similarity = score_arr[1] + 0
                  if (similarity == 100)
                    renames[old_key] = "RENAMED: " old_key " -> " new_key
                  else
                    renames[old_key] = "RENAMED & MODIFIED: " old_key " -> " new_key
                }
              }

              else if (status ~ /^[AMD]/) {
                folder = extract($2)
                if (folder != "") {
                  if (!(folder in statuses)) statuses[folder] = status
                  else if (statuses[folder] != status) statuses[folder] = "M"
                }
              }
            }
            END {
              for (old in renames) print renames[old]
              for (folder in statuses) {
                if (folder in renames) continue
                s = statuses[folder]
                if (s == "A") label = "CREATED"
                else if (s == "D") label = "DELETED"
                else label = "MODIFIED"
                print label ": " folder
              }
            }
          ')

          if [ -z "$CHANGES" ]; then
            echo "No PBIP changes in this push, skipping."
            exit 0
          fi

          LOG_FILE="changelog.md"
          touch $LOG_FILE

          python3 - <<EOF
          import re
          from datetime import datetime, timezone

          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          new_changes = """$CHANGES"""

          with open("changelog.md", "r") as f:
              content = f.read()

          sections = re.split(r'(?=^## \d{4}-\d{2}-\d{2})', content, flags=re.MULTILINE)
          sections = [s for s in sections if s.strip()]

          if sections and sections[0].startswith(f"## {date}"):
              existing = sections[0].rstrip().rstrip('---').strip()
              sections[0] = f"{existing}\n{new_changes}\n\n---\n"
          else:
              new_entry = f"## {date}\n\n{new_changes}\n\n---\n"
              sections.insert(0, new_entry)

          trimmed = sections[:30]

          with open("changelog.md", "w") as f:
              f.write("\n".join(trimmed).strip() + "\n")
          EOF

          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit log
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changelog.md
          git diff --staged --quiet || git commit -m "chore: update changelog $(date -u +%Y-%m-%d)"
          git push
