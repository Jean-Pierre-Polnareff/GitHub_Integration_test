name: PBIP Change Log

on:
  schedule:
    - cron: '0 0 * * *'  # midnight UTC daily
  workflow_dispatch:      # allows manual trigger

jobs:
  log-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect and log PBIP changes
        run: |
          SINCE=$(git log --before="24 hours ago" --format="%H" | head -1)

          if [ -z "$SINCE" ]; then
            echo "No commits older than 24hrs, skipping."
            exit 0
          fi

          CHANGES=$(git diff --name-status -M $SINCE HEAD \
          | awk '
            {
              status = $1

              if (status ~ /^R/) {
                match($2, /^Powerbi\/([^\/]+)\/([^\/]+)\/[^\/]+\.pbip\//, old_arr)
                match($3, /^Powerbi\/([^\/]+)\/([^\/]+)\/[^\/]+\.pbip\//, new_arr)
                if (old_arr[1] != "" && new_arr[1] != "") {
                  old_key = old_arr[1] "/" old_arr[2]
                  new_key = new_arr[1] "/" new_arr[2]
                  match(status, /^R([0-9]+)/, score_arr)
                  similarity = score_arr[1] + 0
                  if (similarity == 100)
                    renames[old_key] = "RENAMED: " old_key " -> " new_key
                  else
                    renames[old_key] = "RENAMED & MODIFIED: " old_key " -> " new_key
                }
              }

              else if (status ~ /^[AMD]/) {
                match($2, /^Powerbi\/([^\/]+)\/([^\/]+)\/[^\/]+\.pbip\//, arr)
                if (arr[1] != "") {
                  folder = arr[1] "/" arr[2]
                  if (!(folder in statuses)) statuses[folder] = status
                  else if (statuses[folder] != status) statuses[folder] = "M"
                }
              }
            }
            END {
              for (old in renames) print renames[old]
              for (folder in statuses) {
                if (folder in renames) continue
                s = statuses[folder]
                if (s == "A") label = "CREATED"
                else if (s == "D") label = "DELETED"
                else label = "MODIFIED"
                print label ": " folder
              }
            }
          ')

          if [ -z "$CHANGES" ]; then
            echo "No PBIP changes in last 24hrs, skipping."
            exit 0
          fi

          LOG_FILE="pbip-changelog.md"

          # Touch the file if it doesn't exist yet
          touch $LOG_FILE

          python3 - <<EOF
          import re
          from datetime import datetime, timezone

          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          new_changes = """$CHANGES"""

          with open("pbip-changelog.md", "r") as f:
              content = f.read()

          sections = re.split(r'(?=^## \d{4}-\d{2}-\d{2})', content, flags=re.MULTILINE)
          sections = [s for s in sections if s.strip()]

          if sections and sections[0].startswith(f"## {date}"):
              # Append to today's existing section
              existing = sections[0].rstrip().rstrip('---').strip()
              sections[0] = f"{existing}\n{new_changes}\n\n---\n"
          else:
              # Prepend as new section
              new_entry = f"## {date}\n\n{new_changes}\n\n---\n"
              sections.insert(0, new_entry)

          trimmed = sections[:30]

          with open("pbip-changelog.md", "w") as f:
              f.write("\n".join(trimmed).strip() + "\n")
          EOF

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pbip-changelog.md
          git diff --staged --quiet || git commit -m "chore: update PBIP changelog $(date -u +%Y-%m-%d)"
          git push